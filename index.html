<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>今天吃什么</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    /* 色彩系统：干净、专业、高可读性 */
    --bg: #F0F2F5;
    --bg-warm: #F7F8FA;
    --surface: #FFFFFF;
    --surface-elevated: #FFFFFF;
    --text-primary: #1F2937;
    --text-secondary: #4B5563;
    --text-muted: #9CA3AF;
    --primary: #5B51D8;
    --primary-light: #EEEDFD;
    --primary-dark: #4338CA;
    --primary-bg: rgba(91,81,216,0.06);
    --accent: #E85A5A;
    --accent-light: #FEF0F0;
    --success: #10B981;
    --success-light: #ECFDF5;
    --warning: #F59E0B;
    --warning-light: #FFFBEB;
    --info: #3B82F6;
    --info-light: #EFF6FF;
    --border: #E8EAED;
    --divider: #F0F2F5;
    /* 圆角系统 */
    --radius-xs: 6px;
    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 18px;
    --radius-xl: 22px;
    --radius-full: 9999px;
    /* 阴影系统：多层次柔和投影 */
    --shadow-xs: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
    --shadow-sm: 0 2px 6px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.07), 0 2px 6px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.09), 0 4px 12px rgba(0,0,0,0.05);
    --shadow-xl: 0 12px 40px rgba(0,0,0,0.12), 0 6px 20px rgba(0,0,0,0.06);
    --shadow-card: 0 1px 3px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.06);
    --shadow-btn: 0 4px 14px rgba(91,81,216,0.30);
    --shadow-btn-hover: 0 6px 20px rgba(91,81,216,0.40);
    /* 字体 & 间距 */
    --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 12px;
    --space-lg: 18px;
    --space-xl: 24px;
    --space-2xl: 32px;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: var(--font-sans);
    color: var(--text-primary);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.6;
  }

  .app-shell {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100dvh;
    background: var(--bg);
    position: relative;
  }

  .header {
    padding: var(--space-2xl) var(--space-xl) 0;
    text-align: center;
    position: relative;
  }
  .header-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.5px;
    line-height: 1.3;
  }
  .header-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: var(--space-sm);
    font-weight: 400;
    letter-spacing: 0.5px;
  }

  /* ── 位置信息栏 ── */
  .location-bar {
    margin: var(--space-lg) var(--space-lg) 0;
    padding: var(--space-lg) var(--space-lg);
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    display: flex;
    align-items: center;
    gap: var(--space-md);
    border: 1px solid rgba(0,0,0,0.03);
  }
  .location-bar-icon {
    width: 38px; height: 38px;
    background: var(--primary-bg);
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }
  .location-bar-text { flex: 1; min-width: 0; }
  .location-bar-addr {
    font-size: 14px; font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .location-bar-sub {
    font-size: 11px; color: var(--text-muted);
    margin-top: 2px; font-weight: 400;
  }
  .location-bar-actions { display: flex; gap: var(--space-sm); flex-shrink: 0; }
  .loc-bar-btn {
    width: 36px; height: 36px;
    background: var(--bg-warm); border: none;
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; cursor: pointer;
    transition: all 0.2s ease;
    color: var(--text-secondary);
  }
  .loc-bar-btn:active { transform: scale(0.92); background: var(--primary-light); color: var(--primary); }
  .loc-bar-btn:hover { background: var(--primary-light); color: var(--primary); }

  /* 隐藏地图容器（AMap仍需初始化） */
  #amap-container { position: absolute; width: 0; height: 0; overflow: hidden; opacity: 0; pointer-events: none; }
  .amap-logo, .amap-copyright { display: none; }

  /* ── 距离筛选条 ── */
  .dist-filter-bar {
    margin: var(--space-lg) var(--space-lg) 0;
    display: flex; gap: 10px; justify-content: center; align-items: center;
  }
  .dist-filter-label { font-size: 13px; color: var(--text-muted); font-weight: 500; white-space: nowrap; }
  .dist-filter-pills { display: flex; gap: 8px; }
  .dist-filter-pill {
    padding: 7px 18px; font-size: 13px; font-weight: 500;
    color: var(--text-secondary); background: var(--surface);
    border: 1.5px solid var(--border); border-radius: var(--radius-full);
    cursor: pointer; transition: all 0.25s ease; white-space: nowrap;
    box-shadow: var(--shadow-xs);
  }
  .dist-filter-pill:hover { border-color: var(--primary); color: var(--primary); box-shadow: var(--shadow-sm); }
  .dist-filter-pill.active {
    background: var(--primary); color: #fff; border-color: var(--primary);
    font-weight: 600; box-shadow: var(--shadow-btn);
  }
  .dist-filter-count { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 6px; display: none; font-weight: 500; }
  .dist-filter-count.show { display: block; }

  /* ── 开箱 ── */
  .open-section {
    margin: var(--space-2xl) var(--space-lg) 0;
    display: flex; flex-direction: column; align-items: center;
  }
  .blindbox-container { position: relative; width: 140px; height: 140px; cursor: pointer; }
  .blindbox-svg { width: 100%; height: 100%; transition: transform 0.2s ease; filter: drop-shadow(0 4px 12px rgba(91,81,216,0.15)); }
  .blindbox-container:active .blindbox-svg { transform: scale(0.94); }
  .blindbox-container.shaking .blindbox-svg { animation: boxShake 0.5s ease-in-out; }
  @keyframes boxShake {
    0%,100% { transform: rotate(0deg); }
    15% { transform: rotate(-6deg) scale(1.05); }
    30% { transform: rotate(6deg) scale(1.08); }
    45% { transform: rotate(-4deg) scale(1.06); }
    60% { transform: rotate(4deg) scale(1.04); }
    75% { transform: rotate(-2deg) scale(1.02); }
  }
  .blindbox-hint { margin-top: var(--space-md); font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .open-btn {
    margin-top: var(--space-lg); padding: 13px 48px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff; font-size: 15px;
    font-family: inherit; font-weight: 600; border: none; border-radius: var(--radius-full);
    cursor: pointer; letter-spacing: 1px;
    box-shadow: var(--shadow-btn);
    transition: all 0.25s ease; position: relative; overflow: hidden;
  }
  .open-btn:hover { box-shadow: var(--shadow-btn-hover); transform: translateY(-2px); }
  .open-btn:active { transform: translateY(0); box-shadow: var(--shadow-md); }
  .open-btn:disabled { background: var(--border); cursor: not-allowed; box-shadow: none; color: var(--text-muted); }

  /* ── 开箱动画 ── */
  .opening-overlay {
    position: fixed; inset: 0;
    background: rgba(245,246,250,0.0); z-index: 100;
    display: none; align-items: center; justify-content: center; flex-direction: column;
  }
  .opening-overlay.show { display: flex; animation: overlayFadeIn 0.3s forwards; }
  @keyframes overlayFadeIn { to { background: rgba(245,246,250,0.94); } }
  @keyframes overlayFadeOut { from { background: rgba(245,246,250,0.94); } to { background: rgba(245,246,250,0.0); } }
  .opening-box-anim { width: 140px; height: 140px; animation: boxOpen 0.8s ease-out forwards; }
  @keyframes boxOpen {
    0% { transform: scale(1) rotate(0deg); opacity: 1; }
    30% { transform: scale(1.2) rotate(-8deg); }
    60% { transform: scale(0.9) rotate(5deg); }
    80% { transform: scale(1.3) rotate(-3deg); opacity: 0.6; }
    100% { transform: scale(0) rotate(20deg); opacity: 0; }
  }
  .opening-sparkles { position: absolute; width: 200px; height: 200px; pointer-events: none; }
  .opening-text { font-size: 22px; font-weight: 700; color: var(--primary); letter-spacing: 2px; margin-top: 16px; animation: textPop 0.4s 0.6s both; opacity: 0; }
  @keyframes textPop { from { opacity: 0; transform: scale(0.6); } to { opacity: 1; transform: scale(1); } }

  /* ── 结果卡片 ── */
  .result-section { display: none; margin: 0 16px 16px; animation: slideUp 0.4s ease-out; }
  .result-section.show { display: block; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .result-card {
    background: var(--surface);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    position: relative;
    border: 1px solid rgba(0,0,0,0.03);
    transition: box-shadow 0.3s ease;
  }

  /* ===== 店铺照片 ===== */
  .result-photo-wrap {
    width: 100%; height: 200px; overflow: hidden; position: relative;
    background: linear-gradient(135deg, #EEEDFD 0%, #FEF0F0 50%, #EFF6FF 100%);
  }
  .result-photo-wrap .photo-list { display: flex; width: 100%; height: 100%; transition: transform 0.4s cubic-bezier(0.22,1,0.36,1); }
  .result-photo-wrap .photo-item { min-width: 100%; height: 100%; position: relative; }
  .result-photo-wrap .photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.4s; }
  .result-photo-wrap .photo-item img.loading { opacity: 0; }
  .result-photo-fallback { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 1; }
  .result-photo-fallback-label { font-size: 12px; color: var(--text-muted); margin-top: 6px; font-weight: 500; letter-spacing: 0.5px; }
  .result-photo-dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 5; }
  .result-photo-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.55); transition: all 0.2s; cursor: pointer; }
  .result-photo-dot.active { background: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.5); width: 18px; border-radius: 3px; }

  /* ── 照片放大灯箱 ── */
  .photo-lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; }
  .photo-lightbox.show { display: flex; }
  .photo-lightbox-content { position: relative; width: 100%; height: 70vh; display: flex; overflow: hidden; }
  .photo-lightbox-track { display: flex; width: 100%; height: 100%; transition: transform 0.35s ease; }
  .photo-lightbox-slide { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .photo-lightbox-slide img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: var(--radius-md); }
  .photo-lightbox-close { position: absolute; top: 16px; right: 16px; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.15); border: none; color: white; font-size: 24px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; }
  .photo-lightbox-counter { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500; z-index: 10; background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 12px; pointer-events: none; }
  .photo-lightbox-dots { position: absolute; bottom: 52px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 10; }
  .photo-lightbox-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: background 0.2s; }
  .photo-lightbox-dot.active { background: white; }

  .result-card-top {
    background: var(--surface);
    padding: var(--space-lg) var(--space-xl) var(--space-md);
    position: relative;
    overflow: hidden;
  }
  .result-badge {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff; font-size: 10px; font-weight: 600;
    padding: 3px 10px; border-radius: var(--radius-full);
    display: inline-block; margin-bottom: var(--space-sm);
    letter-spacing: 0.5px;
  }
  .result-name-row { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; overflow: hidden; }
  .result-name {
    font-size: 21px; font-weight: 700; color: var(--text-primary);
    flex: 1; min-width: 0; padding-right: 4px;
    line-height: 1.35; letter-spacing: -0.3px;
    overflow-wrap: break-word; word-break: break-word;
  }
  .nav-arrow-btn {
    flex-shrink: 0; width: 36px; height: 36px; border: none; border-radius: var(--radius-md);
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease; padding: 0; line-height: 1;
    box-shadow: 0 3px 10px rgba(91,81,216,0.28);
  }
  .nav-arrow-btn:active { transform: scale(0.92); box-shadow: 0 1px 4px rgba(91,81,216,0.2); }
  .poi-type-tag {
    display: inline-block; background: var(--primary-bg);
    color: var(--primary); font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: var(--radius-full);
    margin-top: var(--space-sm); letter-spacing: 0.3px;
  }
  .mall-tag { display: none; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--primary); margin-top: var(--space-sm); padding: 5px 12px; background: var(--primary-bg); border-radius: var(--radius-sm); }
  .mall-tag.show { display: inline-flex; }
  .mall-tag .mall-icon { font-size: 14px; }
  .result-body { padding: var(--space-xl); }
  .info-row { display: flex; align-items: flex-start; gap: var(--space-md); margin-bottom: var(--space-lg); padding-bottom: var(--space-lg); border-bottom: 1px solid var(--divider); }
  .info-row:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .info-icon {
    width: 36px; height: 36px;
    background: var(--primary-bg); border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .info-content { flex: 1; min-width: 0; }
  .info-content-label {
    font-size: 11px; color: var(--text-muted); font-weight: 600;
    margin-bottom: 4px; text-transform: uppercase;
    letter-spacing: 1px;
  }
  .info-content-value {
    font-size: 14px; color: var(--text-primary);
    line-height: 1.6; font-weight: 500; overflow-wrap: break-word; word-break: normal;
  }
  .travel-single { display: flex; align-items: center; gap: var(--space-md); background: var(--bg-warm); border-radius: var(--radius-md); padding: 14px var(--space-lg); }
  .travel-single-icon { font-size: 28px; }
  .travel-single-info { display: flex; flex-direction: column; gap: 2px; }
  .travel-single-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .travel-single-time { font-size: 17px; font-weight: 700; color: var(--text-primary); }
  .travel-recommend { display: flex; align-items: center; gap: 10px; background: var(--bg-warm); border-radius: var(--radius-md); padding: 12px var(--space-lg); margin-bottom: var(--space-md); }
  .travel-recommend-badge { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: var(--radius-full); white-space: nowrap; }
  .travel-recommend-badge.walk { background: var(--success-light); color: #059669; }
  .travel-recommend-badge.bike { background: var(--info-light); color: #2563EB; }
  .travel-recommend-badge.drive { background: var(--accent-light); color: #DC2626; }
  .travel-recommend-time { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .travel-item.highlighted { background: var(--warning-light); transform: scale(1.01); }
  .change-btn {
    margin: var(--space-lg) var(--space-lg) var(--space-2xl); width: calc(100% - 32px); padding: 15px;
    background: var(--surface); color: var(--primary); font-size: 15px;
    font-weight: 600; font-family: inherit; border: 2px solid var(--border);
    border-radius: var(--radius-lg); cursor: pointer; letter-spacing: 1px;
    transition: all 0.25s ease; display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: var(--shadow-sm);
  }
  .change-btn:hover { border-color: var(--primary); background: var(--primary); color: #fff; box-shadow: var(--shadow-btn); transform: translateY(-1px); }
  .change-btn:active { transform: scale(0.98); }
  .change-btn:disabled { background: var(--surface); color: var(--text-muted); border-color: var(--border); cursor: not-allowed; box-shadow: none; }
  .change-btn-icon { width: 24px; height: 24px; background: var(--primary-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: transform 0.3s; }
  .change-btn:hover .change-btn-icon { background: rgba(255,255,255,0.2); }
  .change-btn:active .change-btn-icon { transform: rotate(200deg); }
  .result-count-tip { text-align: center; font-size: 12px; color: var(--text-muted); margin: 6px 0 -4px; font-weight: 500; }
  .deco-top-right, .deco-bottom-left { display: none; }

  /* ── Toast ── */
  .toast {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    background: var(--text-primary); color: #fff;
    padding: 14px 28px; border-radius: var(--radius-lg);
    font-size: 14px; font-weight: 500; opacity: 0;
    transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
    z-index: 200; pointer-events: none;
    box-shadow: var(--shadow-xl);
  }
  .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  .scroll-wrap {
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    height: 100dvh; scroll-behavior: smooth;
    padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 30px);
  }

  .amap-spinner { display: none; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 手动定位弹窗 ── */
  .loc-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(31,41,55,0.35); backdrop-filter: blur(6px);
    z-index: 200; display: none; align-items: center; justify-content: center;
  }
  .loc-modal-overlay.show { display: flex; }
  .loc-modal {
    background: var(--surface); border-radius: var(--radius-xl);
    padding: var(--space-2xl) var(--space-xl) var(--space-xl);
    width: calc(100% - 48px); max-width: 360px;
    box-shadow: var(--shadow-xl);
    animation: modalIn 0.3s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .loc-modal-title { font-size: 17px; font-weight: 700; color: var(--text-primary); text-align: center; margin-bottom: var(--space-lg); }
  .loc-modal-input-wrap { display: flex; gap: 8px; margin-bottom: var(--space-sm); }
  .loc-modal-input {
    flex: 1; padding: 11px 14px;
    border: 1.5px solid var(--border); border-radius: var(--radius-md);
    font-size: 14px; font-family: inherit; color: var(--text-primary);
    background: var(--bg-warm); outline: none;
    transition: all 0.2s; box-shadow: inset 0 1px 2px rgba(0,0,0,0.03);
  }
  .loc-modal-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
  .loc-modal-btn {
    padding: 11px 18px; background: var(--primary); color: #fff;
    font-size: 14px; font-weight: 600; font-family: inherit;
    border: none; border-radius: var(--radius-md); cursor: pointer;
    white-space: nowrap; transition: all 0.15s; box-shadow: var(--shadow-sm);
  }
  .loc-modal-btn:active { opacity: 0.88; transform: scale(0.97); }
  .loc-modal-cancel { display: block; margin: 14px auto 0; font-size: 13px; color: var(--text-muted); cursor: pointer; border: none; background: none; font-weight: 500; transition: color 0.15s; }
  .loc-modal-cancel:hover { color: var(--text-secondary); }
  .loc-modal-error { font-size: 12px; color: var(--accent); margin-top: 6px; font-weight: 500; display: none; }
  .loc-suggest { display: none; margin-top: 8px; max-height: 220px; overflow-y: auto; border: 1.5px solid var(--border); border-radius: var(--radius-md); background: var(--surface); box-shadow: var(--shadow-md); }
  .loc-suggest.show { display: block; }
  .loc-suggest-item { padding: 11px 14px; font-size: 13px; font-weight: 500; color: var(--text-primary); cursor: pointer; border-bottom: 1px solid var(--divider); transition: all 0.15s; display: flex; align-items: center; gap: 8px; }

function handleBoxClick() { var box = document.getElementById('blindbox'); box.classList.remove('shaking'); void box.offsetWidth; box.classList.add('shaking'); setTimeout(function() { box.classList.remove('shaking'); }, 600); }
function openBlindbox() { if (isOpening) return; var filtered = getFilteredResults(); if (filtered.length === 0) { showToast('当前距离内暂无餐厅，试试扩大范围'); return; } isOpening = true; document.getElementById('open-btn').disabled = true; handleBoxClick(); setTimeout(function() { document.getElementById('opening-overlay').classList.add('show'); document.querySelectorAll('#sparkle-group text').forEach(function(t, i) { setTimeout(function() { t.setAttribute('opacity','1'); setTimeout(function() { t.setAttribute('opacity','0.1'); }, 400); }, i * 150); }); }, 400); setTimeout(function() { var used = getFilteredUsedNames(); var available = filtered.filter(function(p) { return p.name && !used.has(p.name); }); if (available.length === 0) { window.distanceFilterUsedNames = new Set(); available = filtered.filter(function(p) { return !!p.name; }); } var picked = available.length ? available[Math.floor(Math.random() * available.length)] : null; if (!picked) { showToast('餐厅都开完了，重新来一轮~'); document.getElementById('opening-overlay').classList.remove('show'); isOpening = false; document.getElementById('open-btn').disabled = false; return; } window.distanceFilterUsedNames.add(picked.name); var overlay = document.getElementById('opening-overlay'); var done = false; function finish() { if (done) return; done = true; overlay.removeEventListener('animationend', finish); overlay.classList.remove('show'); overlay.style.animation = ''; requestAnimationFrame(function() { document.getElementById('res-name').textContent = picked.name; document.getElementById('open-section').style.display = 'none'; document.getElementById('result-section').classList.add('show'); document.getElementById('change-btn').disabled = true; renderResult(picked, null, null); calcTravelTimes(picked, function(bt) { updateTravelTimes(bt); }); document.getElementById('change-btn').disabled = false; isOpening = false; }); } overlay.addEventListener('animationend', finish); overlay.style.animation = 'overlayFadeOut 0.3s forwards'; setTimeout(finish, 500); }, 1600); }
window.openBlindbox = openBlindbox;

function formatTravelTime(t) { if (!t || t.duration == null) return '—'; var distDisplay = ''; if (t.distanceKm != null && t.distanceKm > 0) { var m = Math.round(t.distanceKm * 1000); distDisplay = ' · ' + (m >= 1000 ? t.distanceKm.toFixed(1) + ' km' : m + ' 米'); } return '约 ' + t.duration + ' 分钟' + distDisplay; }
var currentPoiDistanceMeters = null;
function updateSingleTravel(distKm, bikeTime, walkTime) { var mode = getTravelModeByDistance(currentPoiDistanceMeters); var timeEl = document.getElementById('res-travel-time'); var iconEl = document.getElementById('travel-best-icon'); var labelEl = document.getElementById('travel-best-label'); if (!timeEl) return; iconEl.textContent = getTravelEmojiByMode(mode); labelEl.textContent = getTravelLabelByMode(mode); if (mode === 'walk') { if (walkTime) timeEl.textContent = formatTravelTime(walkTime); else if (distKm > 0) timeEl.textContent = '约 ' + Math.round(distKm / 5 * 60) + ' 分钟'; else timeEl.textContent = '计算中…'; } else if (mode === 'bike') { if (bikeTime) timeEl.textContent = formatTravelTime(bikeTime); else if (distKm > 0) timeEl.textContent = '约 ' + Math.round(distKm / 15 * 60) + ' 分钟'; else timeEl.textContent = '计算中…'; } else { if (bikeTime) timeEl.textContent = formatTravelTime(bikeTime); else if (distKm > 0) timeEl.textContent = '约 ' + Math.round(distKm / 40 * 60) + ' 分钟'; else timeEl.textContent = '计算中…'; } }
function updateTravelTimes(bt) { var mode = getTravelModeByDistance(currentPoiDistanceMeters); var timeEl = document.getElementById('res-travel-time'); var iconEl = document.getElementById('travel-best-icon'); var labelEl = document.getElementById('travel-best-label'); if (!timeEl || !bt) return; var t = null; if (mode === 'walk') t = bt.walk; else if (mode === 'bike') t = bt.bike; else t = bt.drive; if (t) timeEl.textContent = formatTravelTime(t); if (iconEl) iconEl.textContent = getTravelEmojiByMode(mode); if (labelEl) labelEl.textContent = getTravelLabelByMode(mode); }

function detectMall(poi) { var addr = (poi.address || '').trim(); if (!addr) return null; var mallKWs = ['大悦城','万达广场','龙湖天街','来福士','太古里','凯德MALL','SKP','IFS','合生汇','蓝色港湾','国贸','SOHO','万象城']; for (var i = 0; i < mallKWs.length; i++) { var idx = addr.indexOf(mallKWs[i]); if (idx !== -1) { var start = idx; while (start > 0 && !/[区县市路街号道]/.test(addr[start - 1])) start--; var raw = addr.substring(start, idx + mallKWs[i].length).trim().replace(/[\s]*(B\d|F\d|\d+F)[\s]*$/i, '').trim(); if (raw.length >= 2) return raw; } } return null; }

function openNavigation(poi){
  if(!poi||!poi.location){showToast("暂无位置信息");return;}
  var plng,plat;
  if(typeof poi.location.getLng==="function"){plng=poi.location.getLng();plat=poi.location.getLat()}
  else{plng=poi.location.lng;plat=poi.location.lat}
  if(!plng||!plat){showToast("位置信息异常");return;}
  var name=(poi.name||"餐厅").replace(/[#'"&]/g,"");
  var distMeters=poi._distance||poi.distance||0;
  var navMode=getTravelModeByDistance(distMeters);
  var mm={walk:"walk",bike:"bike",drive:"car"};
  var tp=plng+","+plat+","+encodeURIComponent(name);
  var fp="";
  var ul=window.userLocation;
  if(ul&&ul.lng&&ul.lat){fp="&from="+ul.lng+","+ul.lat+",我的位置"}
  var isWechat=/MicroMessenger/i.test(navigator.userAgent);
  var nv="https://uri.amap.com/navigation?to="+tp+fp+"&mode="+(mm[navMode]||"car")+(isWechat?"&callnative=0":"&callnative=1");
  var jumped=false;
  try{
    window.location.href=nv;jumped=true;
    setTimeout(function(){if(jumped){console.log("[nav] fallback...");tryFallbackNav(nv,plng,plat,name)}},2000);
    var msg=isWechat?"\u6b63\u5728\u6253\u5f00\u9ad8\u5fb7\u5730\u56fe\u7f51\u9875\u7248":"\u6b63\u5728\u8df3\u8f6c\u5230\u9ad8\u5fb7\u5730\u56fe\u5bfc\u822a";showToast(msg);
  }catch(e){console.warn("[nav] err:",e);tryFallbackNav(nv,plng,plat,name)}
  function tryFallbackNav(url,lng2,lat2,name2){
    jumped=false;
    try{var a=document.createElement("a");a.target="_blank";a.href=url;a.rel="noopener";a.style.display="none";document.body.appendChild(a);a.click();document.body.removeChild(a);jumped=true;showToast("正在尝试打开导航…")}catch(e2){try{window.open(url,"_blank");jumped=true}catch(e3){}}
    if(!jumped){showToast("跳转受限，请在浏览器打开高德地图搜索: "+name2)}
  }
}

function renderResult(poi, bikeTime, walkTime) { currentPoiDistanceMeters = poi._distance || poi.distance || 0; var distMeters = poi._distance || poi.distance || 0; var distKm = distMeters / 1000; var mallName = detectMall(poi); var nameEl = document.getElementById('res-name'); var mallTagEl = document.getElementById('mall-tag'); if (mallName) { nameEl.innerHTML = '<span style="color:var(--text-muted);font-size:16px;">' + escHtml(mallName) + '</span><span style="color:var(--text-primary);"> · ' + escHtml(poi.name) + '</span>'; mallTagEl.innerHTML = '<span class="mall-icon">🏬</span> ' + escHtml(mallName); mallTagEl.className = 'mall-tag show'; } else { nameEl.textContent = poi.name; mallTagEl.className = 'mall-tag'; mallTagEl.innerHTML = ''; } renderPhoto(poi); if (distMeters > 0) { document.getElementById('res-distance').textContent = distMeters >= 1000 ? distKm.toFixed(1) + ' km' : distMeters + ' 米'; } else { document.getElementById('res-distance').textContent = '—'; } document.getElementById('res-address').textContent = poi.address || '—'; document.getElementById('res-category').textContent = getAmapCategory(poi) || '—'; updateSingleTravel(distKm, bikeTime, walkTime); var filtered = getFilteredResults(); var used = getFilteredUsedNames(); var rem = filtered.length - used.size; document.getElementById('result-count-tip').textContent = rem > 0 ? '还有 ' + rem + ' 家餐厅可以探索' : '已探索完所有餐厅，再多开一轮？'; document.getElementById('open-btn').disabled = false; document.getElementById('nav-arrow-btn').onclick = function() { openNavigation(poi); }; }

function changeRestaurant() { if (isOpening) return; var filtered = getFilteredResults(); if (filtered.length === 0) { showToast('当前距离内暂无餐厅'); return; } var used = getFilteredUsedNames(); var remaining = filtered.filter(function(p) { return p.name && !used.has(p.name); }); if (remaining.length === 0 && used.size >= filtered.length) { window.distanceFilterUsedNames = new Set(); } isOpening = true; document.getElementById('result-section').classList.remove('show'); document.getElementById('open-section').style.display = 'flex'; handleBoxClick(); setTimeout(function() { document.getElementById('opening-overlay').classList.add('show'); document.querySelectorAll('#sparkle-group text').forEach(function(t, i) { setTimeout(function() { t.setAttribute('opacity','1'); setTimeout(function() { t.setAttribute('opacity','0.1'); }, 400); }, i * 150); }); }, 400); setTimeout(function() { var used2 = getFilteredUsedNames(); var av = filtered.filter(function(p) { return p.name && !used2.has(p.name); }); var picked = av.length ? av[Math.floor(Math.random() * av.length)] : null; if (!picked) { showToast('附近暂无更多餐厅'); document.getElementById('opening-overlay').classList.remove('show'); isOpening = false; return; } window.distanceFilterUsedNames.add(picked.name); var overlay = document.getElementById('opening-overlay'); var done2 = false; function finish2() { if (done2) return; done2 = true; overlay.removeEventListener('animationend', finish2); overlay.classList.remove('show'); overlay.style.animation = ''; requestAnimationFrame(function() { document.getElementById('res-name').textContent = picked.name; document.getElementById('open-section').style.display = 'none'; document.getElementById('result-section').classList.add('show'); document.getElementById('change-btn').disabled = true; renderResult(picked, null, null); calcTravelTimes(picked, function(bt) { updateTravelTimes(bt); }); document.getElementById('change-btn').disabled = false; isOpening = false; }); } overlay.addEventListener('animationend', finish2); overlay.style.animation = 'overlayFadeOut 0.3s forwards'; setTimeout(finish2, 500); }, 1600); }
window.changeRestaurant = changeRestaurant;

var toastTimer = null;
function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); if (toastTimer) clearTimeout(toastTimer); toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2200); }
</script>

<div class="loc-modal-overlay" id="loc-modal-overlay">
  <div class="loc-modal">
    <div class="loc-modal-title">📍 手动设置位置</div>
    <div class="loc-modal-input-wrap">
      <input class="loc-modal-input" id="loc-input" type="text" placeholder="输入城市、商圈或地址…" autocomplete="off">
      <button class="loc-modal-btn" onclick="submitLoc()">定位</button>
    </div>
    <div class="loc-modal-error" id="loc-error"></div>
    <div class="loc-suggest" id="loc-suggest"></div>
    <button class="loc-modal-cancel" onclick="closeLocModal()">取消</button>
  </div>
</div>

</div><!-- .app-shell -->
